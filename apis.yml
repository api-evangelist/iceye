aid: iceye
name: ICEYE
description: >-
  ICEYE operates the world's largest constellation of small Synthetic Aperture
  Radar (SAR) satellites, delivering all-weather day-and-night imagery down to
  25 cm resolution across multiple modes. The ICEYE API Platform at
  api.iceye.com exposes a Catalog API over an archive of 60,000+ SAR scenes
  and a Tasking API that lets customers schedule the constellation up to 14
  days in advance without a feasibility study or human-in-the-loop. A
  companion Company API exposes account context. Beyond raw imagery, ICEYE
  publishes natural catastrophe products - Flood Insights, Wildfire Insights,
  and Hurricane Insights - used by insurance, government, banking, and
  utilities customers, and ships Gen 4 ISR, ISR Cell, Connect, and Federate
  sovereign mission systems for defense and intelligence.
type: Index
position: Provider
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
