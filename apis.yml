apis:
  - aid: iceye:catalog
    name: ICEYE Catalog API
    description: >-
      Search, list, purchase, and retrieve products from ICEYE's archive of
      60,000+ SAR scenes. Endpoints cover catalog item search, listing,
      purchase, and retrieval of purchased items for download.
    humanURL: https://docs.iceye.com/constellation/api/1.0/
    baseURL: https://api.iceye.com
    tags:
      - Catalog
      - Search
      - Archive
      - SAR
    properties:
      - type: Documentation
        url: https://docs.iceye.com/constellation/api/1.0/
  - aid: iceye:tasking
    name: ICEYE Tasking API
    description: >-
      Direct tasking interface to the ICEYE SAR constellation. Create tasks up
      to 14 days in advance with no feasibility study, retrieve task status,
      list tasks, cancel tasks, fetch task scenes, and price tasks - built for
      machine-to-machine automation.
    humanURL: https://docs.iceye.com/constellation/api/tasking/
    baseURL: https://api.iceye.com
    tags:
      - Tasking
      - SAR
      - Constellation
      - Automation
    properties:
      - type: Documentation
        url: https://docs.iceye.com/constellation/api/tasking/
  - aid: iceye:company
    name: ICEYE Company API
    description: >-
      Account and company context API providing identity, entitlement, and
      organizational metadata that frames Catalog and Tasking calls.
    humanURL: https://docs.iceye.com/constellation/api/1.0/
    baseURL: https://api.iceye.com
    tags:
      - Account
      - Company
      - Identity
    properties:
      - type: Documentation
        url: https://docs.iceye.com/constellation/api/1.0/
  - aid: iceye:platform
    name: ICEYE Platform
    description: >-
      Web platform at platform.iceye.com for browsing catalog imagery,
      submitting tasking orders, monitoring task status, and downloading
      delivered SAR products through the same backend as the API Platform.
    humanURL: https://platform.iceye.com/
    baseURL: https://platform.iceye.com/
    tags:
      - Platform
      - Web Console
      - Tasking
    properties:
      - type: Documentation
        url: https://platform.iceye.com/docs/tasking
